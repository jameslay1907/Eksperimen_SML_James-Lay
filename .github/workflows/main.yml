name: Automated Preprocessing

on:
  push:
    branches:
      - main
    paths-ignore:
      - "preprocessing/ai_student_impact_preprocessing/*.csv"
jobs:
  preprocess:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run preprocessing
        run: |
          python preprocessing/automate_James-Lay.py

      - name: Commit generated datasets
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}

          git add preprocessing/ai_student_impact_preprocessing/

          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update preprocessed datasets"
            git push
          fi
